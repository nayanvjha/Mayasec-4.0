services:
  # Ingress Proxy - single external entrypoint for HTTP/HTTPS traffic
  ingress-proxy:
    build:
      context: ./ingress_proxy
      dockerfile: Dockerfile
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      PRODUCTION_BACKEND: http://production-web:3000
      HONEYPOT_BACKEND: http://victim-web:80
      ML_SCORE_URL: http://ml-service:8001/score
      ML_TIMEOUT_MS: "50"
      SCORE_THRESHOLD: "80"
      RATE_LIMIT_PER_IP: "200"
      PROXY_SENSOR_ID: ingress-proxy-01
      BEHAVIORAL_SCORE_URL: http://mayasec-core:5001/api/behavioral/score
      BEHAVIORAL_TIMEOUT_MS: "50"
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - mayasec-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL - Storage Layer
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-mayasec}
      POSTGRES_USER: ${DB_USER:-mayasec}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mayasec}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-mayasec}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    networks:
      - mayasec-net

  # Migration Service - Runs migrations on startup
  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      MAYASEC_MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations:ro
    restart: "no"
    command: python migration_manager.py run
    networks:
      - mayasec-net

  # Core Service - Threat Analysis Engine
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    cap_add:
      - NET_ADMIN
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      CORE_PORT: 5001
      FLASK_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "5001:5001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    command: python core/__init__.py
    networks:
      mayasec-net:
        aliases:
          - mayasec-core

  # API Service - Control Plane
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      CORE_URL: http://core:5001
      HONEYPOT_URL: http://victim-web:80
      API_PORT: 5000
      API_DEBUG: 'False'
      FLASK_ENV: production
      MAYASEC_RESPONSE_MODE: ${MAYASEC_RESPONSE_MODE:-monitor}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      core:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    command: python mayasec_api.py
    networks:
      - mayasec-net

  # Production Backend - internal only, reached through ingress proxy
  production-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://api:5000
    environment:
      REACT_APP_API_URL: http://api:5000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mayasec-net

  # Victim Web - deception backend, internal only
  victim-web:
    build:
      context: ./victim-web
      dockerfile: Dockerfile
    ports: []
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      mayasec-net:
        aliases:
          - victim-web

  # ML Service - Behavioral + WAF scoring
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    volumes:
      - ./ml-service/models:/app/models:ro
    environment:
      SCORE_THRESHOLD: "80"
      LOG_LEVEL: INFO
      MODELS_DIR: /app/models
    ports: []
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mayasec-net

  # Frontend Service - React UI Dashboard
  mayasec-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
    environment:
      REACT_APP_API_URL: http://localhost:5000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mayasec-net

volumes:
  postgres_data:
    driver: local

networks:
  mayasec-net:
    driver: bridge
