services:
  # Ingress Proxy - single external entrypoint for HTTP/HTTPS traffic
  ingress-proxy:
    build:
      context: ./ingress_proxy
      dockerfile: Dockerfile
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      PRODUCTION_BACKEND: http://production-web:3000
      HONEYPOT_BACKEND: http://victim-web:8080
      CLICKHOUSE_URL: http://clickhouse:8123
      ML_SCORE_URL: http://ml-service:8001/score
      REDIS_URL: redis://redis:6379/0
      ML_TIMEOUT_MS: "5000"
      BEHAVIORAL_SCORE_URL: http://mayasec-core:5001/api/behavioral/score
      BEHAVIORAL_TIMEOUT_MS: "5000"
      BEHAVIORAL_FEEDBACK_URL: http://core:5001/api/behavioral/feedback
      BEHAVIORAL_FEEDBACK_TIMEOUT_MS: "5000"
      LLM_WAF_URL: http://llm-service:8002/classify-zero-day
      LLM_WAF_TIMEOUT_MS: "10000"
      SCORE_THRESHOLD: "80"
      RATE_LIMIT_PER_IP: "200"
      PROXY_SENSOR_ID: ingress-proxy-01
      API_EMIT_URL: http://api:5000/api/v1/emit-event
      ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
    depends_on:
      ml-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - mayasec-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL - Storage Layer
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-mayasec}
      POSTGRES_USER: ${DB_USER:-mayasec}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mayasec}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mayasec}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    networks:
      - mayasec-net

  # Redis - shared low-latency state store
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data
    networks:
      - mayasec-net

  # ClickHouse - raw HTTP traffic log storage
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "8123:8123"
    volumes:
      - clickhouse_data_v2:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8123/?query=SELECT%201"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - mayasec-net

  neo4j:
    image: neo4j:5
    container_name: mayasec_neo4j
    environment:
      NEO4J_AUTH: neo4j/mayasec_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "mayasec_neo4j", "RETURN 1"]
      interval: 20s
      timeout: 30s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - mayasec-net

  # Migration Service - Runs migrations on startup
  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      MAYASEC_MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations:ro
    restart: "no"
    command: python migration_manager.py run
    networks:
      - mayasec-net

  # Core Service - Threat Analysis Engine
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    cap_add:
      - NET_ADMIN
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mayasec_neo4j
      CORE_PORT: 5001
      REDIS_URL: redis://redis:6379/0
      LLM_SERVICE_URL: http://llm-service:8002
      API_URL: http://api:5000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
      FLASK_ENV: production
      MAYASEC_RESPONSE_MODE: ${MAYASEC_RESPONSE_MODE:-deception}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    command: python core/__init__.py
    networks:
      mayasec-net:
        aliases:
          - mayasec-core

  # API Service - Control Plane
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      CORE_URL: http://core:5001
      LLM_SERVICE_URL: http://llm-service:8002
      COPILOT_URL: http://soc-copilot:8003
      REDIS_URL: redis://redis:6379/0
      HONEYPOT_URL: http://victim-web:80
      API_PORT: 5000
      API_DEBUG: 'False'
      ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
      FLASK_ENV: production
      MAYASEC_RESPONSE_MODE: ${MAYASEC_RESPONSE_MODE:-deception}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      core:
        condition: service_healthy
      llm-service:
        condition: service_started
      soc-copilot:
        condition: service_started
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    command: python mayasec_api.py
    networks:
      - mayasec-net

  event-worker:
    build:
      context: .
      dockerfile: Dockerfile.event-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://mayasec:mayasec@postgres:5432/mayasec
      EVENT_STREAM_NAME: mayasec:events
      EVENT_STREAM_GROUP: mayasec-workers
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      - mayasec-net

  report-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mayasec
      DB_USER: mayasec
      DB_PASSWORD: mayasec
      REPORTS_DIR: reports
      REPORT_SCHEDULER_POLL_SECONDS: 60
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@mayasec.local}
      MAYASEC_RESPONSE_MODE: ${MAYASEC_RESPONSE_MODE:-deception}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    command: python workers/report_scheduler.py
    volumes:
      - ./reports:/app/reports
    networks:
      - mayasec-net

  # Production Backend - internal only, reached through ingress proxy
  production-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://api:5000
        REACT_APP_ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
    environment:
      REACT_APP_API_URL: http://api:5000
      REACT_APP_ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mayasec-net

  # Victim Web - deception backend, internal only
  victim-web:
    build:
      context: .
      dockerfile: victim-web/Dockerfile
    environment:
      LLM_SERVICE_URL: http://llm-service:8002
      CORE_URL: http://core:5001
      INGESTOR_URL: http://ingestor:5001
      REDIS_URL: redis://redis:6379/0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mayasec}
      DB_USER: ${DB_USER:-mayasec}
      DB_PASSWORD: ${DB_PASSWORD:-mayasec}
      DEFAULT_TENANT_SLUG: demo
    depends_on:
      - llm-service
      - redis
    ports: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      mayasec-net:
        aliases:
          - victim-web

  # ML Service (placeholder for Phase 2 implementation)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    volumes:
      - ./ml-service/models:/app/models:ro
    ports: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - mayasec-net

  # Ollama Service - local LLM runtime
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - mayasec-net

  # LLM Service - threat narratives and advanced classifiers
  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    ports:
      - "8002:8002"
    networks:
      - mayasec-net

  soc-copilot:
    build:
      context: ./soc-copilot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: mayasec
      DB_USER: mayasec
      DB_PASSWORD: mayasec
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mayasec_neo4j
      CORE_URL: http://core:5001
      LLM_SERVICE_URL: http://llm-service:8002
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      LLM_TIMEOUT_SECONDS: "15"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      llm-service:
        condition: service_started
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=5)"]
      interval: 15s
      timeout: 8s
      retries: 10
      start_period: 60s
    ports:
      - "8003:8003"
    networks:
      - mayasec-net

  # Frontend Service - React UI Dashboard
  mayasec-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
        REACT_APP_ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_ADMIN_TOKEN: ${ADMIN_TOKEN:-mayasec_internal_token}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mayasec-net

volumes:
  clickhouse_data_v2:
    driver: local
  neo4j_data:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

networks:
  mayasec-net:
    driver: bridge
